version: '3.8'

services:
  fastapi:
    build: ./
    env_file: .env
    environment:
        - DATABASE_URL=${DATABASE_URL}
    ports:
      - "80:8000"

  db:
    env_file: .env
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
          - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

